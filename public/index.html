<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏏 IPL Auction – Home</title>
  <meta name="description" content="Create or join a real-time IPL-style multiplayer auction room with friends."/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; position: relative; z-index: 1; }
    .hero-logo { font-family: 'Rajdhani', sans-serif; font-size: clamp(3rem,8vw,5.5rem); font-weight: 900; background: linear-gradient(135deg,#f97316,#fbbf24,#f97316); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; margin-bottom: 8px; }
    .hero-sub { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 48px; text-align: center; }
    .home-card { width: 100%; max-width: 480px; animation: zoomIn 0.4s ease; }
    .tabs { display: flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 13px; background: transparent; border: none; color: var(--text-secondary); font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-content { display: none; flex-direction: column; gap: 20px; }
    .tab-content.active { display: flex; }
    .avatar-picker { display: flex; flex-wrap: wrap; gap: 10px; }
    .avatar-opt { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: all 0.2s; background: var(--bg-secondary); }
    .avatar-opt:hover { border-color: var(--accent); transform: scale(1.1); }
    .avatar-opt.selected { border-color: var(--accent); background: rgba(249,115,22,0.15); box-shadow: 0 0 12px rgba(249,115,22,0.4); }
    .room-code-input { font-size: 2rem !important; text-align: center; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .settings-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--border); cursor: pointer; }
    .settings-toggle span { color: var(--text-secondary); font-size: 0.9rem; }
    .chevron { transition: transform 0.3s; font-size: 0.8rem; }
    .chevron.open { transform: rotate(180deg); }
    .adv-settings { display: none; }
    .adv-settings.open { display: grid; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    .range-val { min-width: 60px; text-align: right; font-weight: 700; color: var(--accent); font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; }
    .floating-cricket { position: fixed; font-size: 4rem; opacity: 0.04; animation: float linear infinite; pointer-events: none; }
    @keyframes float { 0%{transform:translateY(100vh) rotate(0deg);} 100%{transform:translateY(-100px) rotate(360deg);} }
  </style>
</head>
<body>
<div id="toast-container"></div>

<!-- Floating decorations -->
<div class="floating-cricket" style="left:5%;animation-duration:14s;animation-delay:0s">🏏</div>
<div class="floating-cricket" style="left:15%;animation-duration:18s;animation-delay:4s">🏆</div>
<div class="floating-cricket" style="left:75%;animation-duration:12s;animation-delay:2s">⚡</div>
<div class="floating-cricket" style="left:88%;animation-duration:20s;animation-delay:7s">🏏</div>

<div class="hero">
  <div class="hero-logo">🏏 IPL AUCTION</div>
  <p class="hero-sub">Real-time multiplayer auction system for cricket fans</p>

  <div class="card home-card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-create" onclick="switchTab('create')">⚡ Create Room</button>
      <button class="tab-btn" id="tab-join" onclick="switchTab('join')">🔗 Join Room</button>
    </div>

    <!-- CREATE TAB -->
    <div class="tab-content active" id="content-create">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" id="create-name" placeholder="Enter your username" maxlength="20" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Choose Avatar</label>
        <div class="avatar-picker" id="avatar-picker-create"></div>
      </div>

      <!-- Advanced Settings Toggle -->
      <div class="settings-toggle" onclick="toggleSettings()">
        <span>⚙️ Room Settings</span>
        <span class="chevron" id="chevron">▼</span>
      </div>
      <div class="adv-settings settings-grid" id="adv-settings">
        <div class="form-group">
          <label class="form-label">Budget (₹ Cr)</label>
          <div class="range-row">
            <input type="range" id="budget" min="50" max="500" step="25" value="100" oninput="updateRange('budget','budget-val',v=>v+' Cr')"/>
            <span class="range-val" id="budget-val">100 Cr</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Timer (sec)</label>
          <div class="range-row">
            <input type="range" id="timer" min="5" max="30" step="5" value="10" oninput="updateRange('timer','timer-val',v=>v+'s')"/>
            <span class="range-val" id="timer-val">10s</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Min Increment (₹L)</label>
          <div class="range-row">
            <input type="range" id="increment" min="5" max="50" step="5" value="5" oninput="updateRange('increment','inc-val',v=>'₹'+v+'L')"/>
            <span class="range-val" id="inc-val">₹5L</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Max Team Size</label>
          <div class="range-row">
            <input type="range" id="maxteam" min="11" max="25" step="1" value="15" oninput="updateRange('maxteam','maxteam-val',v=>v+' players')"/>
            <span class="range-val" id="maxteam-val">15 players</span>
          </div>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="create-btn" onclick="createRoom()">
        ⚡ Create Room
      </button>
    </div>

    <!-- JOIN TAB -->
    <div class="tab-content" id="content-join">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" id="join-name" placeholder="Enter your username" maxlength="20" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Choose Avatar</label>
        <div class="avatar-picker" id="avatar-picker-join"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Room Code</label>
        <input class="form-input room-code-input" id="join-code" placeholder="ABC123" maxlength="6" autocomplete="off"/>
      </div>
      <button class="btn btn-success btn-full btn-lg" id="join-btn" onclick="joinRoom()">
        🔗 Join Room
      </button>
    </div>
  </div>

  <p style="margin-top:20px;color:var(--text-muted);font-size:0.8rem;">Built for cricket fans &bull; Real-time bidding</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/utils.js"></script>
<script>
const AVATARS = ['😎','🦁','🐯','🦅','🔥','⚡','🏏','🎯','👑','💎','🚀','🌟','🐉','🦊','💪'];
let selectedAvatar = { create: AVATARS[0], join: AVATARS[0] };

function renderAvatars(containerId, key) {
  const el = document.getElementById(containerId);
  el.innerHTML = AVATARS.map((a,i) => `
    <div class="avatar-opt ${i===0?'selected':''}" data-key="${key}" data-avatar="${a}" onclick="selectAvatar('${containerId}','${key}','${a}',this)">
      ${a}
    </div>`).join('');
}
renderAvatars('avatar-picker-create','create');
renderAvatars('avatar-picker-join','join');

function selectAvatar(containerId, key, avatar, el) {
  document.querySelectorAll(`#${containerId} .avatar-opt`).forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar[key] = avatar;
}

function switchTab(tab) {
  ['create','join'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`content-${t}`).classList.toggle('active', t===tab);
  });
}

function toggleSettings() {
  const el = document.getElementById('adv-settings');
  const ch = document.getElementById('chevron');
  el.classList.toggle('open');
  ch.classList.toggle('open');
}

function updateRange(id, valId, fmt) {
  const v = document.getElementById(id).value;
  document.getElementById(valId).textContent = fmt(v);
}

function createRoom() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) return showToast('Please enter your name', 'error');
  const settings = {
    budget: parseInt(document.getElementById('budget').value) * 100,  // convert Cr to L
    timerDuration: parseInt(document.getElementById('timer').value),
    minIncrement: parseInt(document.getElementById('increment').value),
    maxTeamSize: parseInt(document.getElementById('maxteam').value),
  };
  const socket = io();
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating...';

  socket.emit('create_room', { name, avatar: selectedAvatar.create, settings }, (res) => {
    if (res.error) { showToast(res.error, 'error'); btn.disabled=false; btn.textContent='⚡ Create Room'; return; }
    sessionStorage.setItem('auc_roomId', res.roomId);
    sessionStorage.setItem('auc_name', name);
    sessionStorage.setItem('auc_avatar', selectedAvatar.create);
    sessionStorage.setItem('auc_socketId', socket.id);
    window.location.href = `/lobby.html?room=${res.roomId}`;
  });
}

function joinRoom() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) return showToast('Please enter your name', 'error');
  if (code.length < 4) return showToast('Enter a valid room code', 'error');
  const socket = io();
  const btn = document.getElementById('join-btn');
  btn.disabled=true; btn.textContent='Joining...';

  socket.emit('join_room', { roomId: code, name, avatar: selectedAvatar.join }, (res) => {
    if (res.error) { showToast(res.error, 'error'); btn.disabled=false; btn.textContent='🔗 Join Room'; return; }
    sessionStorage.setItem('auc_roomId', res.roomId);
    sessionStorage.setItem('auc_name', name);
    sessionStorage.setItem('auc_avatar', selectedAvatar.join);
    sessionStorage.setItem('auc_socketId', socket.id);
    window.location.href = `/lobby.html?room=${res.roomId}`;
  });
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.tab-content.active');
    if (active.id === 'content-create') createRoom();
    else joinRoom();
  }
});
document.getElementById('join-code').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});
</script>
</body>
</html>
