<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏆 IPL Auction – Results & Rankings</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .results-page { max-width: 1280px; margin: 0 auto; padding: 24px; }

    /* Hero */
    .results-hero { text-align: center; padding: 48px 24px 32px; background: linear-gradient(135deg, rgba(249,115,22,0.08), rgba(251,191,36,0.05)); border: 1px solid rgba(249,115,22,0.2); border-radius: var(--radius-xl); margin-bottom: 32px; animation: fadeIn 0.6s ease; }
    .results-title { font-size: clamp(2.5rem,6vw,4rem); background: linear-gradient(135deg,#f97316,#fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }

    /* ── RANKING PODIUM ── */
    .podium-section { margin-bottom: 40px; }
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .podium-card {
      width: 200px; padding: 20px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border: 2px solid var(--border);
      text-align: center; transition: all 0.3s;
      animation: zoomIn 0.5s ease;
    }
    .podium-card.rank-1 { width: 220px; border-color: rgba(251,191,36,0.6); background: linear-gradient(145deg,rgba(251,191,36,0.08),var(--bg-card)); box-shadow: 0 0 40px rgba(251,191,36,0.2); }
    .podium-card.rank-2 { border-color: rgba(148,163,184,0.5); }
    .podium-card.rank-3 { border-color: rgba(180,120,60,0.5); }
    .podium-base {
      width: 100%; text-align: center; padding: 10px;
      font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 900;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
    }
    .podium-base.rank-1 { background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #0a0b0f; height: 80px; display:flex;align-items:center;justify-content:center; }
    .podium-base.rank-2 { background: linear-gradient(135deg,#94a3b8,#64748b); color: #fff; height: 60px; display:flex;align-items:center;justify-content:center; }
    .podium-base.rank-3 { background: linear-gradient(135deg,#b4783c,#92400e); color: #fff; height: 44px; display:flex;align-items:center;justify-content:center; }
    .podium-rank-icon { font-size: 2.4rem; margin-bottom: 8px; }
    .podium-name { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .podium-score { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent); }
    .podium-grade { font-size: 0.9rem; font-weight: 700; padding: 3px 10px; border-radius: 12px; display: inline-block; margin-top: 4px; }

    /* ── FULL RANKINGS TABLE ── */
    .rankings-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
    .rank-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: border-color 0.2s; animation: fadeIn 0.4s ease;
    }
    .rank-card:hover { border-color: rgba(249,115,22,0.25); }
    .rank-card.rank-1 { border-color: rgba(251,191,36,0.5); }
    .rank-card.rank-2 { border-color: rgba(148,163,184,0.4); }
    .rank-card.rank-3 { border-color: rgba(180,120,60,0.4); }

    .rank-header {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 24px; cursor: pointer;
      background: linear-gradient(135deg, rgba(249,115,22,0.04), transparent);
    }
    .rank-number { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 900; min-width: 36px; }
    .rank-user { flex: 1; }
    .rank-user-name { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; }
    .rank-user-sub { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; }

    /* Score bars */
    .score-section { padding: 0 24px 20px; }
    .score-total { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .score-total-value { font-family: 'Rajdhani', sans-serif; font-size: 2.5rem; font-weight: 900; color: var(--accent); }
    .score-total-label { font-size: 0.8rem; color: var(--text-muted); }

    .score-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    @media(max-width:600px){ .score-bars { grid-template-columns: 1fr; } }
    .score-bar-row { display: flex; flex-direction: column; gap: 6px; }
    .score-bar-header { display: flex; justify-content: space-between; align-items: center; }
    .score-bar-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }
    .score-bar-value { font-size: 0.85rem; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
    .score-bar-bg { height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.34,1.2,0.64,1); }

    /* Insights & team */
    .insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:700px){ .insights-grid { grid-template-columns: 1fr; } }
    .insight-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
    .insight-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
    .insight-list { display: flex; flex-direction: column; gap: 6px; }
    .insight-item { font-size: 0.82rem; display: flex; gap: 6px; align-items: flex-start; }
    .insight-bullet { flex-shrink: 0; }

    /* Team roster */
    .team-roster { padding: 0 24px 20px; }
    .roster-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .roster-player {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: border-color 0.2s;
    }
    .roster-player:hover { border-color: rgba(249,115,22,0.3); }
    .roster-player-photo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; object-position: top; flex-shrink: 0; border: 1px solid var(--border); background: var(--bg-card); }
    .roster-player-emoji { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; background: var(--bg-card); border: 1px solid var(--border); flex-shrink: 0; }
    .roster-player-info { flex: 1; min-width: 0; }
    .roster-player-name { font-size: 0.78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .roster-player-price { font-size: 0.7rem; color: var(--accent-gold); font-family: 'Rajdhani', sans-serif; font-weight: 700; }

    /* Grade color */
    .grade-S  { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .grade-A  { background: rgba(16,185,129,0.2); color: #10b981; }
    .grade-B  { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .grade-C  { background: rgba(139,92,246,0.2); color: #8b5cf6; }
    .grade-D  { background: rgba(239,68,68,0.2); color: #ef4444; }

    /* Summary stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; text-align: center; }
    .stat-card-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .stat-card-value { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .stat-card-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 4px; }

    /* Most expensive */
    .most-expensive { background: linear-gradient(135deg,rgba(251,191,36,0.1),rgba(249,115,22,0.05)); border: 1px solid rgba(251,191,36,0.3); border-radius: var(--radius-lg); padding: 20px 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 32px; animation: slideInLeft 0.4s ease; }
    .most-expensive-price { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent-gold); }

    /* Expand toggle */
    .expand-toggle { font-size: 0.8rem; color: var(--text-muted); padding: 8px 24px; cursor: pointer; display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--border); transition: color 0.2s; }
    .expand-toggle:hover { color: var(--accent); }
    .expand-content { display: none; }
    .expand-content.open { display: block; }

    .action-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding: 24px 0; }
  </style>
</head>
<body>
<div id="toast-container"></div>
<header class="page-header">
  <div class="logo">🏏 IPL Auction</div>
  <span class="stat-chip">🏁 Auction Complete — Team Rankings</span>
</header>

<div class="results-page">
  <!-- Hero -->
  <div class="results-hero">
    <div class="results-title">🏆 AUCTION COMPLETE!</div>
    <div id="results-sub" style="color:var(--text-secondary);margin-top:8px">Calculating team rankings...</div>
  </div>

  <!-- Most expensive player -->
  <div class="most-expensive" id="most-expensive" style="display:none">
    <div style="font-size:3rem" id="exp-emoji">🏏</div>
    <div style="flex:1">
      <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">💎 Most Expensive Player</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700" id="exp-name">—</div>
      <div style="font-size:0.82rem;color:var(--text-muted);margin-top:2px" id="exp-winner">—</div>
    </div>
    <div class="most-expensive-price" id="exp-price">—</div>
  </div>

  <!-- Summary stats -->
  <h2 style="margin-bottom:16px">📊 Auction Summary</h2>
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Podium top 3 -->
  <div class="podium-section">
    <h2 style="margin-bottom:4px">🏆 Team Rankings</h2>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:24px">Based on Player Quality · Team Balance · Coordination & Synergy</p>
    <div class="podium" id="podium"></div>
  </div>

  <!-- Detailed rankings -->
  <h2 style="margin-bottom:16px">📋 Detailed Analysis</h2>
  <div class="rankings-grid" id="rankings-grid"></div>

  <div class="action-row">
    <button class="btn btn-primary btn-lg" onclick="window.location.href='/'">🏠 New Auction</button>
    <button class="btn btn-secondary" onclick="shareResults()">📤 Share Rankings</button>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
// ─── TEAM RANKING ALGORITHM ─────────────────────────────────────────────────

/**
 * Score components (total 100 pts):
 *  1. Quality Score     (0–35): Average player rating, star power
 *  2. Balance Score     (0–30): Role distribution vs ideal XI
 *  3. Coordination      (0–20): Top/middle/lower order cover, pace+spin combo
 *  4. Value Efficiency  (0–15): Budget efficiency
 */
function scoreTeam(team, totalBudget, budgetSpent) {
  if (!team || team.length === 0) return { total:0, quality:0, balance:0, coordination:0, value:0, grade:'D', insights:{strengths:[],weaknesses:[],suggestions:[]} };

  const ratings = team.map(p => p.rating || 5);
  const avgRating = ratings.reduce((s,r)=>s+r,0) / ratings.length;
  const starPlayers = team.filter(p => (p.rating||5) >= 9).length;   // world class
  const goodPlayers = team.filter(p => (p.rating||5) >= 7).length;

  // 1. QUALITY (35 pts)
  const qualityBase = (avgRating / 10) * 25;                          // 0-25 from avg
  const starBonus  = Math.min(starPlayers * 3, 8);                    // up to 8 bonus
  const goodBonus  = Math.min(goodPlayers * 0.5, 2);                  // up to 2 bonus
  const quality = Math.round(Math.min(qualityBase + starBonus + goodBonus, 35));

  // 2. BALANCE (30 pts) – based on ideal playing XI (5 BAT, 1 WK, 2 AR, 3 BWL, 1 extra flexible)
  const roles = { BAT:0, BWL:0, WK:0, AR:0 };
  team.forEach(p => { if (roles[p.role] !== undefined) roles[p.role]++; });

  const batScore = Math.min(roles.BAT / 4, 1);        // need 4+ batsmen
  const wkScore  = Math.min(roles.WK, 1);              // at least 1 WK
  const bwlScore = Math.min(roles.BWL / 4, 1);        // need 4+ bowlers
  const arScore  = Math.min(roles.AR / 2, 1);         // need 2+ AR
  const sizeScore = Math.min(team.length / 11, 1);    // having 11+ players

  const balance = Math.round(((batScore + wkScore + bwlScore + arScore + sizeScore) / 5) * 30);

  // 3. COORDINATION (20 pts)
  const hasTopOrder    = team.some(p => p.role === 'BAT' && (p.rating||5) >= 8);    // quality opener/no3
  const hasPinchHitter = team.some(p => (p.role === 'AR' || p.role === 'WK') && (p.rating||5) >= 8);
  const hasPaceAce     = team.some(p => p.role === 'BWL' && (p.rating||5) >= 9);
  const hasSpinner     = team.some(p => p.role === 'BWL' && ['Yuzvendra Chahal','Rashid Khan','Varun Chakaravarthy','Kuldeep Yadav','Ravichandran Ashwin','Sunil Narine','Noor Ahmad','Ravi Bishnoi','Karn Sharma'].includes(p.name));
  const hasFinisher    = team.some(p => ['MS Dhoni','Andre Russell','Hardik Pandya','Kieron Pollard','Tim David','Rinku Singh'].includes(p.name));
  const hasCaptainMaterial = team.some(p => ['Rohit Sharma','Virat Kohli','KL Rahul','Shubman Gill','Shreyas Iyer','Pat Cummins','Hardik Pandya'].includes(p.name));

  const coordPoints = [hasTopOrder, hasPinchHitter, hasPaceAce, hasSpinner, hasFinisher, hasCaptainMaterial];
  const coordination = Math.round((coordPoints.filter(Boolean).length / coordPoints.length) * 20);

  // 4. VALUE EFFICIENCY (15 pts)
  const avgSoldPrice = budgetSpent / Math.max(team.length, 1);
  const avgQuality = avgRating / 10;
  // Higher quality per crore = better efficiency
  const efficiency = totalBudget > 0 ? (avgQuality / (avgSoldPrice / (totalBudget / 10))) : 0;
  const value = Math.round(Math.min(efficiency * 7.5, 15));

  const total = Math.min(quality + balance + coordination + value, 100);

  // Grade
  let grade = 'D';
  if (total >= 85) grade = 'S';
  else if (total >= 72) grade = 'A';
  else if (total >= 58) grade = 'B';
  else if (total >= 42) grade = 'C';

  // Insights
  const strengths = [];
  const weaknesses = [];
  const suggestions = [];

  if (quality >= 28) strengths.push('World-class player lineup with multiple star players');
  else if (quality >= 20) strengths.push('Solid mix of quality players');
  else weaknesses.push('Lack of high-rating players — team may struggle in key moments');

  if (roles.BAT >= 5) strengths.push('Deep batting lineup, great for high-scoring matches');
  else if (roles.BAT < 3) { weaknesses.push('Batting is thin — vulnerable batting collapses'); suggestions.push('Add 2–3 more quality batsmen'); }

  if (roles.BWL >= 4) strengths.push('Strong bowling attack with depth');
  else if (roles.BWL < 2) { weaknesses.push('Very limited bowling — could concede heavily'); suggestions.push('Prioritize pace & spin bowlers'); }

  if (roles.WK === 0) { weaknesses.push('No wicketkeeper in squad!'); suggestions.push('Must acquire a WK immediately'); }
  else if (roles.WK >= 2) strengths.push('Good wicketkeeper cover');

  if (roles.AR >= 2) strengths.push('All-rounders add flexibility & balance');
  else if (roles.AR === 0) { weaknesses.push('No all-rounders limits tactical flexibility'); suggestions.push('An all-rounder like Hardik/Jadeja changes everything'); }

  if (hasSpinner && hasPaceAce) strengths.push('Excellent pace-spin combination in bowling');
  else if (!hasSpinner) suggestions.push('A quality spinner is vital on subcontinent pitches');

  if (hasFinisher) strengths.push('Reliable death-overs finisher in the squad');
  else suggestions.push('Acquire a proven finisher for final overs');

  if (starPlayers >= 3) strengths.push(`${starPlayers} world-class players — marquee talent`);

  if (team.length >= 14) strengths.push('Large, deep squad with strong bench options');
  else if (team.length <= 7) { weaknesses.push('Very small squad — injury cover is poor'); suggestions.push('Build squad depth with 11+ players total'); }

  if (value >= 12) strengths.push('Exceptional budget efficiency — great value signings');
  else if (value <= 5) weaknesses.push('Overpaid for some acquisitions');

  return { total, quality, balance, coordination, value, grade, insights: { strengths, weaknesses, suggestions } };
}

function gradeColor(grade) {
  return { S:'#fbbf24', A:'#10b981', B:'#3b82f6', C:'#8b5cf6', D:'#ef4444' }[grade] || '#94a3b8';
}
function gradeLabel(grade) {
  return { S:'S – Legendary', A:'A – Excellent', B:'B – Good', C:'C – Average', D:'D – Weak' }[grade] || grade;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function computeResults() {
  let results = null;
  try { results = JSON.parse(sessionStorage.getItem('auc_results')); } catch(e){}
  if (!results || !Array.isArray(results)) {
    document.getElementById('rankings-grid').innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:60px">No results found. <a href="/" style="color:var(--accent)">Go Home</a></div>';
    return;
  }

  // Score each team
  const totalBudget = results[0] ? (results[0].budgetSpent + results[0].budgetLeft) : 10000;
  const scored = results.map(r => ({
    ...r,
    score: scoreTeam(r.team, totalBudget, r.budgetSpent)
  })).sort((a,b) => b.score.total - a.score.total);

  renderSummary(results, scored);
  renderMostExpensive(results);
  renderPodium(scored);
  renderRankings(scored, totalBudget);
}

function renderSummary(results, scored) {
  const totalPlayers = results.reduce((s,r) => s+r.team.length, 0);
  const totalSpent   = results.reduce((s,r) => s+r.budgetSpent, 0);
  const winner = scored[0];
  let mostExp = null;
  results.forEach(r => r.team.forEach(p => { if (!mostExp || p.soldPrice > mostExp.soldPrice) mostExp = p; }));

  document.getElementById('results-sub').textContent =
    `${totalPlayers} players sold · ${results.length} teams ranked by Quality, Balance & Coordination`;

  document.getElementById('stats-grid').innerHTML = [
    { icon:'👥', value: results.length, label:'Teams Competing' },
    { icon:'🏏', value: totalPlayers, label:'Players Sold' },
    { icon:'💰', value: formatPrice(totalSpent), label:'Total Spent' },
    { icon:'📊', value: formatPrice(Math.round(totalSpent / Math.max(totalPlayers,1))), label:'Avg Sale Price' },
    { icon:'💎', value: mostExp ? formatPrice(mostExp.soldPrice) : '—', label:'Top Bid' },
    { icon:'🏆', value: winner ? winner.name : '—', label:'Best Team' },
    { icon:'⭐', value: winner ? `${winner.score.total}/100` : '—', label:'Top Score' },
    { icon:'🎯', value: winner ? winner.score.grade : '—', label:'Top Grade' },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-card-icon">${s.icon}</div>
      <div class="stat-card-value">${s.value}</div>
      <div class="stat-card-label">${s.label}</div>
    </div>`).join('');
}

function renderMostExpensive(results) {
  let mostExp = null, mostExpWinner = null;
  results.forEach(r => r.team.forEach(p => {
    if (!mostExp || p.soldPrice > mostExp.soldPrice) { mostExp = p; mostExpWinner = r; }
  }));
  if (!mostExp) return;
  document.getElementById('most-expensive').style.display = 'flex';
  document.getElementById('exp-emoji').textContent = mostExp.emoji || '🏏';
  document.getElementById('exp-name').textContent = mostExp.name;
  document.getElementById('exp-winner').textContent = `Won by ${mostExpWinner.name}`;
  document.getElementById('exp-price').textContent = formatPrice(mostExp.soldPrice);
}

function renderPodium(scored) {
  const top3 = scored.slice(0, 3);
  const podiumOrder = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3;
  const medals = ['🥇','🥈','🥉'];
  const ranks  = [2, 1, 3];

  const podiumEl = document.getElementById('podium');
  podiumEl.innerHTML = podiumOrder.map((r, idx) => {
    if (!r) return '';
    const realRank = scored.indexOf(r) + 1;
    const gc = gradeColor(r.score.grade);
    return `
    <div class="podium-slot" style="animation-delay:${idx*0.15}s">
      <div class="podium-card rank-${realRank}">
        <div class="podium-rank-icon">${medals[realRank-1] || realRank}</div>
        <div class="avatar avatar-xl" style="margin: 0 auto 10px">${r.avatar}</div>
        <div class="podium-name">${r.name}</div>
        <div class="podium-score">${r.score.total}<span style="font-size:1rem;color:var(--text-muted)">/100</span></div>
        <span class="podium-grade grade-${r.score.grade}">${r.score.grade} – ${gradeLabel(r.score.grade).split('–')[1].trim()}</span>
        <div style="margin-top:10px;font-size:0.78rem;color:var(--text-muted)">${r.team.length} players · ${formatPrice(r.budgetLeft)} left</div>
      </div>
      <div class="podium-base rank-${realRank}">#${realRank}</div>
    </div>`;
  }).join('');
}

function renderRankings(scored, totalBudget) {
  const grid = document.getElementById('rankings-grid');
  grid.innerHTML = scored.map((r, idx) => {
    const s = r.score;
    const gc = gradeColor(s.grade);
    const roles = { BAT:0, BWL:0, WK:0, AR:0 };
    r.team.forEach(p => { if (roles[p.role] !== undefined) roles[p.role]++; });

    return `
    <div class="rank-card rank-${idx+1}" id="rankcard-${idx}" style="animation-delay:${idx*0.08}s">
      <!-- Collapsible header -->
      <div class="rank-header" onclick="toggleExpand(${idx})">
        <div class="rank-number" style="color:${idx===0?'#fbbf24':idx===1?'#94a3b8':idx===2?'#b4783c':'var(--text-muted)'}">
          #${idx+1}
        </div>
        <div class="avatar avatar-lg">${r.avatar}</div>
        <div class="rank-user">
          <div class="rank-user-name">${r.name}</div>
          <div class="rank-user-sub">
            ${r.team.length} players · ${formatPrice(r.budgetSpent)} spent · ${formatPrice(r.budgetLeft)} remaining
          </div>
          <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
            ${roles.BAT>0?`<span class="role-badge role-BAT" style="font-size:0.62rem;padding:2px 7px">🏏 ${roles.BAT}</span>`:''}
            ${roles.BWL>0?`<span class="role-badge role-BWL" style="font-size:0.62rem;padding:2px 7px">🎳 ${roles.BWL}</span>`:''}
            ${roles.WK>0?`<span class="role-badge role-WK" style="font-size:0.62rem;padding:2px 7px">🧤 ${roles.WK}</span>`:''}
            ${roles.AR>0?`<span class="role-badge role-AR" style="font-size:0.62rem;padding:2px 7px">⚡ ${roles.AR}</span>`:''}
          </div>
        </div>
        <!-- Score summary -->
        <div style="text-align:center;margin-left:auto">
          <div style="font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:900;color:${gc}">${s.total}</div>
          <div style="font-size:0.7rem;color:var(--text-muted)">/ 100</div>
          <span class="podium-grade grade-${s.grade}" style="margin-top:6px;display:inline-block">${s.grade}</span>
        </div>
        <span style="color:var(--text-muted);font-size:1.2rem;margin-left:12px" id="chevron-${idx}">▼</span>
      </div>

      <!-- Expanded content -->
      <div class="expand-content" id="expand-${idx}">
        <div class="score-section">
          <div class="score-total">
            <div>
              <div style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Overall Score</div>
              <div style="display:flex;align-items:baseline;gap:8px">
                <span class="score-total-value">${s.total}</span>
                <span style="color:var(--text-muted)">/100</span>
              </div>
            </div>
            <div style="flex:1;margin-left:20px">
              <div class="score-bar-bg" style="height:12px;border-radius:6px">
                <div class="score-bar-fill" style="width:${s.total}%;background:linear-gradient(90deg,${gc},${gc}aa)"></div>
              </div>
            </div>
            <span style="font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:${gc}">${gradeLabel(s.grade)}</span>
          </div>

          <div class="score-bars">
            ${[
              { label:'⭐ Player Quality', val: s.quality, max: 35, color: '#fbbf24' },
              { label:'⚖️ Team Balance',   val: s.balance, max: 30, color: '#10b981' },
              { label:'🎯 Coordination',   val: s.coordination, max: 20, color: '#3b82f6' },
              { label:'💰 Value for Money',val: s.value,  max: 15, color: '#8b5cf6' },
            ].map(sc => `
              <div class="score-bar-row">
                <div class="score-bar-header">
                  <span class="score-bar-label">${sc.label}</span>
                  <span class="score-bar-value" style="color:${sc.color}">${sc.val}/${sc.max}</span>
                </div>
                <div class="score-bar-bg">
                  <div class="score-bar-fill" style="width:${(sc.val/sc.max)*100}%;background:${sc.color}"></div>
                </div>
              </div>`).join('')}
          </div>

          <div class="insights-grid">
            <div class="insight-box">
              <div class="insight-title">💪 Strengths</div>
              <div class="insight-list">
                ${s.insights.strengths.length
                  ? s.insights.strengths.map(t=>`<div class="insight-item"><span class="insight-bullet">✅</span><span>${t}</span></div>`).join('')
                  : '<div class="insight-item" style="color:var(--text-muted)">No notable strengths found</div>'}
              </div>
            </div>
            <div class="insight-box">
              <div class="insight-title">⚠️ Weaknesses & Tips</div>
              <div class="insight-list">
                ${s.insights.weaknesses.map(t=>`<div class="insight-item"><span class="insight-bullet">❌</span><span>${t}</span></div>`).join('')}
                ${s.insights.suggestions.map(t=>`<div class="insight-item"><span class="insight-bullet">💡</span><span>${t}</span></div>`).join('')}
                ${!s.insights.weaknesses.length && !s.insights.suggestions.length ? '<div class="insight-item" style="color:var(--accent-green)">Team looks solid!</div>' : ''}
              </div>
            </div>
          </div>
        </div>

        <!-- Team roster with photos -->
        <div class="team-roster">
          <div class="roster-header">
            <span style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600">📋 Squad (${r.team.length})</span>
          </div>
          <div class="roster-grid">
            ${r.team.length === 0
              ? '<div style="color:var(--text-muted);font-size:0.85rem;grid-column:1/-1;text-align:center">No players bought</div>'
              : r.team.map(p => `
                <div class="roster-player" title="${p.name} – ${formatPrice(p.soldPrice)}">
                  ${p.imageUrl
                    ? `<img class="roster-player-photo" src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${'<div class="roster-player-emoji" style="display:none">'+p.emoji+'</div>'}`
                    : `<div class="roster-player-emoji">${p.emoji}</div>`
                  }
                  <div class="roster-player-info">
                    <div class="roster-player-name">${p.name}</div>
                    <div style="display:flex;gap:4px;align-items:center;margin-top:2px">
                      <span class="role-badge role-${p.role}" style="font-size:0.55rem;padding:1px 5px">${p.role}</span>
                      <span class="roster-player-price">${formatPrice(p.soldPrice)}</span>
                    </div>
                  </div>
                </div>`).join('')
            }
          </div>
        </div>
      </div>

      <!-- Expand/collapse toggle -->
      <div class="expand-toggle" onclick="toggleExpand(${idx})">
        <span id="expand-label-${idx}">▼ Show full analysis & roster</span>
      </div>
    </div>`;
  }).join('');

  // Auto-expand winner
  setTimeout(() => toggleExpand(0), 300);
}

function toggleExpand(idx) {
  const content = document.getElementById(`expand-${idx}`);
  const label   = document.getElementById(`expand-label-${idx}`);
  const chevron = document.getElementById(`chevron-${idx}`);
  const isOpen  = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  label.textContent   = isOpen ? '▼ Show full analysis & roster' : '▲ Hide analysis';
  if (chevron) chevron.textContent = isOpen ? '▼' : '▲';

  // Animate score bars after expand
  if (!isOpen) {
    setTimeout(() => {
      document.querySelectorAll(`#expand-${idx} .score-bar-fill`).forEach(el => {
        const w = el.style.width;
        el.style.width = '0%';
        setTimeout(() => el.style.width = w, 50);
      });
    }, 50);
  }
}

function shareResults() {
  let results = [];
  try { results = JSON.parse(sessionStorage.getItem('auc_results') || '[]'); } catch(e){}
  const totalBudget = results[0] ? (results[0].budgetSpent + results[0].budgetLeft) : 10000;
  const scored = results.map(r => ({ ...r, score: scoreTeam(r.team, totalBudget, r.budgetSpent) }))
    .sort((a,b) => b.score.total - a.score.total);
  const text = '🏏 IPL Auction Team Rankings!\n\n' +
    scored.map((r,i) => `${i+1}. ${r.name} – ${r.score.grade} (${r.score.total}/100) | ${r.team.length} players`).join('\n');
  if (navigator.share) navigator.share({ title: 'IPL Auction Rankings', text });
  else { navigator.clipboard.writeText(text); showToast('Rankings copied!', 'success'); }
}

computeResults();
</script>
</body>
</html>
